<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sinter Heat Recovery Power Plant - 3D Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#loading-screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 50%, #0a0a2e 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 1000; transition: opacity 0.8s ease;
}
#loading-screen.hidden { opacity: 0; pointer-events: none; }
#loading-screen h1 { color: #00d4ff; font-size: 28px; margin-bottom: 20px; text-shadow: 0 0 20px rgba(0,212,255,0.5); }
#loading-bar-container { width: 300px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; }
#loading-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #00d4ff, #00ff88); border-radius: 2px; transition: width 0.3s; }
#loading-text { color: rgba(255,255,255,0.5); font-size: 12px; margin-top: 15px; }

#header {
  position: fixed; top: 0; left: 0; right: 0; height: 50px;
  background: rgba(10,10,30,0.85); backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(0,212,255,0.2);
  display: flex; align-items: center; padding: 0 20px; z-index: 100;
}
#header h1 { color: #00d4ff; font-size: 16px; font-weight: 500; letter-spacing: 1px; }
#header .subtitle { color: rgba(255,255,255,0.4); font-size: 11px; margin-left: 15px; letter-spacing: 0.5px; }

#sidebar {
  position: fixed; top: 50px; left: 0; width: 280px; bottom: 0;
  background: rgba(10,10,30,0.9); backdrop-filter: blur(10px);
  border-right: 1px solid rgba(0,212,255,0.15);
  z-index: 90; overflow-y: auto; padding: 15px;
  transition: transform 0.3s ease;
}
#sidebar.collapsed { transform: translateX(-280px); }

#toggle-sidebar {
  position: fixed; top: 60px; left: 280px; width: 30px; height: 30px;
  background: rgba(10,10,30,0.9); border: 1px solid rgba(0,212,255,0.3);
  border-radius: 0 5px 5px 0; color: #00d4ff; cursor: pointer;
  z-index: 95; display: flex; align-items: center; justify-content: center;
  transition: left 0.3s ease; font-size: 14px;
}
#toggle-sidebar.shifted { left: 0; }

.section-title {
  color: #00d4ff; font-size: 11px; text-transform: uppercase;
  letter-spacing: 2px; margin-bottom: 10px; padding-bottom: 5px;
  border-bottom: 1px solid rgba(0,212,255,0.15);
}

.component-btn {
  width: 100%; padding: 10px 12px; margin-bottom: 6px;
  background: rgba(0,212,255,0.05); border: 1px solid rgba(0,212,255,0.1);
  border-radius: 6px; color: rgba(255,255,255,0.7); cursor: pointer;
  text-align: left; font-size: 12px; transition: all 0.2s;
  display: flex; align-items: center; gap: 10px;
}
.component-btn:hover { background: rgba(0,212,255,0.15); border-color: rgba(0,212,255,0.3); color: #fff; }
.component-btn.active { background: rgba(0,212,255,0.2); border-color: #00d4ff; color: #00d4ff; }
.component-btn .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

#info-panel {
  position: fixed; top: 50px; right: 0; width: 320px; bottom: 0;
  background: rgba(10,10,30,0.92); backdrop-filter: blur(10px);
  border-left: 1px solid rgba(0,212,255,0.15);

  transform: translateX(320px); transition: transform 0.3s ease;
}
#info-panel.visible { transform: translateX(0); }
#info-panel h2 { color: #00d4ff; font-size: 18px; margin-bottom: 5px; }
#info-panel .tag { display: inline-block; padding: 2px 8px; background: rgba(0,212,255,0.15); border-radius: 10px; color: #00d4ff; font-size: 10px; margin-bottom: 15px; }
#info-panel p { color: rgba(255,255,255,0.6); font-size: 12px; line-height: 1.7; margin-bottom: 12px; }
#info-panel .spec { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }

#close-info {

}
#close-info:hover { border-color: #ff4466; color: #ff4466; }

let scene, camera, renderer, controls;
let components = {};
let flowParticles = [];
let flowEnabled = true;
let raycaster, mouse;
let selectedComponent = null;
let hoveredComponent = null;
let clock = new THREE.Clock();

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a1a);
  scene.fog = new THREE.FogExp2(0x0a0a1a, 0.0015);

  camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(40, 30, 50);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  document.body.appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minDistance = 10;
  controls.maxDistance = 150;
  controls.target.set(0, 5, 0);

  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2();

  setupLighting();
  buildScene();
  createFlowParticles();
  setupUI();
  setupInteraction();

  window.addEventListener('resize', onResize);

  const loadBar = document.getElementById('loading-bar');
  loadBar.style.width = '100%';
  document.getElementById('loading-text').textContent = 'Ready';
  setTimeout(() => document.getElementById('loading-screen').classList.add('hidden'), 600);

  animate();
}

function setupLighting() {
  const ambient = new THREE.AmbientLight(0x334466, 0.6);
  scene.add(ambient);

  const dir = new THREE.DirectionalLight(0xffeedd, 1.2);
  dir.position.set(30, 40, 20);
  dir.castShadow = true;
  dir.shadow.mapSize.set(2048, 2048);
  dir.shadow.camera.near = 0.5;
  dir.shadow.camera.far = 100;
  dir.shadow.camera.left = -40;
  dir.shadow.camera.right = 40;
  dir.shadow.camera.top = 40;
  dir.shadow.camera.bottom = -40;
  scene.add(dir);

  const hemi = new THREE.HemisphereLight(0x4488ff, 0x223344, 0.4);
  scene.add(hemi);

  const rimLight = new THREE.DirectionalLight(0x00aaff, 0.3);
  rimLight.position.set(-20, 10, -20);
  scene.add(rimLight);
}

function makeMat(color, emissiveIntensity = 0.1) {
  return new THREE.MeshStandardMaterial({
    color, metalness: 0.6, roughness: 0.35,
    emissive: color, emissiveIntensity
  });
}

function makeGlowMat(color) {
  return new THREE.MeshStandardMaterial({
    color, metalness: 0.3, roughness: 0.2,
    emissive: color, emissiveIntensity: 0.4, transparent: true, opacity: 0.85
  });
}

function buildScene() {
  const grid = new THREE.GridHelper(100, 50, 0x112233, 0x0a1522);
  grid.position.y = -0.01;
  scene.add(grid);

  const groundGeo = new THREE.PlaneGeometry(120, 120);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x0a0f1a, metalness: 0.1, roughness: 0.9 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.02;
  ground.receiveShadow = true;
  scene.add(ground);

  buildSinterMachine();
  buildCooler();
  buildHoodFrontPanel();
  buildBoiler();
  buildEvaporator();
  buildEconomizer();
  buildSteamDrum();
  buildTurbine();
  buildGenerator();
  buildCondenser();
  buildPumps();
  buildDeionizedTank();
  buildExhaustStack();
  buildRiver();
  buildPiping();
  buildSuperheaterToTurbinePipe();
  buildEvaporatorToSteamDrumPipe();
  buildLabels();
}

function createBox(w, h, d, color, pos, label) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = makeMat(color);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(...pos);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.userData = { id: label };
  scene.add(mesh);
  components[label] = mesh;
  return mesh;
}

function createCylinder(rTop, rBot, h, color, pos, label, segments = 16) {
  const geo = new THREE.CylinderGeometry(rTop, rBot, h, segments);
  const mat = makeMat(color);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(...pos);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.userData = { id: label };
  scene.add(mesh);
  components[label] = mesh;
  return mesh;
}

function createLinearPipe(points, color, radius) {
  radius = radius || 0.25;
  const group = new THREE.Group();
  const mat = makeMat(color, 0.35);

  for (let i = 0; i < points.length - 1; i++) {
    const a = points[i];
    const b = points[i + 1];
    const dx = b[0] - a[0];
    const dy = b[1] - a[1];
    const dz = b[2] - a[2];
    const len = Math.sqrt(dx * dx + dy * dy + dz * dz);
    const mx = (a[0] + b[0]) / 2;
    const my = (a[1] + b[1]) / 2;
    const mz = (a[2] + b[2]) / 2;

    const seg = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius, len, 10), mat);
    seg.position.set(mx, my, mz);
    if (Math.abs(dx) > 0.001) {
      seg.rotation.z = Math.PI / 2;
    } else if (Math.abs(dz) > 0.001) {
      seg.rotation.x = Math.PI / 2;
    }
    seg.castShadow = true;
    group.add(seg);

    if (i > 0) {
      const prev = points[i - 1];
      const pDx = a[0] - prev[0];
      const pDy = a[1] - prev[1];
      const pDz = a[2] - prev[2];
      const elbow = new THREE.Mesh(
        new THREE.TorusGeometry(radius * 2.2, radius, 8, 12, Math.PI / 2),
        mat
      );
      elbow.position.set(a[0], a[1], a[2]);

      const horizontal = Math.abs(pDx) > 0.001 || Math.abs(pDz) > 0.001;
      const goingUp = dy > 0.001;
      const goingDown = dy < -0.001;

      if (Math.abs(pDx) > 0.001 && Math.abs(dy) > 0.001) {
        elbow.rotation.z = goingUp ? -Math.PI / 2 : Math.PI / 2;
      } else if (Math.abs(pDz) > 0.001 && Math.abs(dy) > 0.001) {
        elbow.rotation.x = goingUp ? Math.PI / 2 : -Math.PI / 2;
      } else if (Math.abs(pDx) > 0.001 && Math.abs(dz) > 0.001) {
        elbow.rotation.y = dz > 0 ? Math.PI / 2 : -Math.PI / 2;
      } else if (Math.abs(dy) > 0.001 && Math.abs(dz) > 0.001) {
        elbow.rotation.z = dz > 0 ? 0 : Math.PI;
      }

      elbow.castShadow = true;
      group.add(elbow);
    }
  }
  return group;
}

function buildSinterMachine() {
  createBox(20, 3, 10, 0xff6b35, [-25, 2.5, 0], 'sinterMachine');
}

function buildCooler() {
  createBox(14, 3.5, 10, 0xff8844, [-10, 2.75, 0], 'cooler');
}

function buildHoodFrontPanel() {
  const panelMat = makeMat(0xff6b35);
  const panel = new THREE.Mesh(new THREE.BoxGeometry(36, 4, 0.2), panelMat);
  panel.position.set(-18, 2.6, -5.15);
  panel.castShadow = true;
  scene.add(panel);
}

function buildBoiler() {
  const shellMat = new THREE.MeshStandardMaterial({
    color: 0xffcc00, metalness: 0.5, roughness: 0.4,
    transparent: true, opacity: 0.15, side: THREE.DoubleSide
  });
  const shellGeo = new THREE.BoxGeometry(12, 14, 8);
  const shell = new THREE.Mesh(shellGeo, shellMat);
  shell.position.set(5, 8, 0);
  shell.castShadow = true;
  shell.receiveShadow = true;
  scene.add(shell);

  const edgeMat = new THREE.LineBasicMaterial({ color: 0xddaa00, transparent: true, opacity: 0.5 });
  const edges = new THREE.EdgesGeometry(shellGeo);
  const wireframe = new THREE.LineSegments(edges, edgeMat);
  wireframe.position.set(5, 8, 0);
  scene.add(wireframe);

  components.boiler = shell;

  const stackGeo = new THREE.CylinderGeometry(0.8, 1.2, 6, 16);
  const stackMat = makeMat(0x999999, 0.05);
  const stack = new THREE.Mesh(stackGeo, stackMat);
  stack.position.set(5, 17, 0);
  stack.castShadow = true;

  const superGroup = new THREE.Group();
  superGroup.userData = { id: 'superheater' };
  const sFrameMat = makeMat(0x882222, 0.05);
  const sFrameW = 10, sFrameH = 2.8, sFrameD = 6, sThick = 0.15;

  superGroup.add(new THREE.Mesh(new THREE.BoxGeometry(sFrameW, sFrameH, sThick), sFrameMat).translateX(5).translateY(13.5).translateZ(-sFrameD / 2));
  superGroup.add(new THREE.Mesh(new THREE.BoxGeometry(sThick, sFrameH, sFrameD), sFrameMat).translateX(5 - sFrameW / 2).translateY(13.5));
  superGroup.add(new THREE.Mesh(new THREE.BoxGeometry(sThick, sFrameH, sFrameD), sFrameMat).translateX(5 + sFrameW / 2).translateY(13.5));

  const sCoilMat = new THREE.MeshStandardMaterial({ color: 0xff4444, metalness: 0.8, roughness: 0.2, emissive: 0xff4444, emissiveIntensity: 0.25 });
  const sCoilW = sFrameW * 0.85, sCoilH = sFrameH * 0.75, sCoilD = sFrameD * 0.85;
  for (let r = 0; r < 4; r++) {
    const y = 13.5 - sCoilH / 2 + (r + 0.5) * (sCoilH / 4);
    for (let c = 0; c < 5; c++) {
      const tube = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, sCoilD, 12), sCoilMat);
      tube.position.set(5 - sCoilW / 2 + (c + 0.5) * (sCoilW / 5), y, 0);
      tube.rotation.x = Math.PI / 2;
      superGroup.add(tube);
    }
  }
  scene.add(superGroup);
  components.superheater = superGroup;
}

function buildEvaporator() {
  const coilGroup = new THREE.Group();
  coilGroup.userData = { id: 'evaporator' };

  const frameMat = makeMat(0x666666, 0.05);
  const frameW = 10, frameH = 3.5, frameD = 6;
  const thickness = 0.2;

  const topPlate = new THREE.Mesh(new THREE.BoxGeometry(frameW + 0.4, thickness, frameD + 0.2), frameMat);
  topPlate.position.set(5, 8.5 + frameH / 2 + thickness / 2, 0);
  coilGroup.add(topPlate);

  const bottomPlate = new THREE.Mesh(new THREE.BoxGeometry(frameW + 0.4, thickness, frameD + 0.2), frameMat);
  bottomPlate.position.set(5, 8.5 - frameH / 2 - thickness / 2, 0);
  coilGroup.add(bottomPlate);

  const leftHeader = new THREE.Mesh(new THREE.BoxGeometry(thickness * 1.5, frameH + thickness * 2, frameD + 0.2), frameMat);
  leftHeader.position.set(5 - frameW / 2 - thickness * 0.75, 8.5, 0);
  coilGroup.add(leftHeader);

  const copperMat = new THREE.MeshStandardMaterial({ color: 0xb87333, metalness: 0.9, roughness: 0.15, emissive: 0xb87333, emissiveIntensity: 0.15 });
  const rows = 8;
  const tubesPerRow = 6;
  const coilW = frameW * 0.9;
  const coilH = frameH * 0.85;
  const coilD = frameD * 0.9;
  const tubeRadius = 0.12;
  const tubeSpacing = coilD / (tubesPerRow + 1);
  const rowSpacing = coilH / (rows - 1);

  for (let r = 0; r < rows; r++) {
    const y = 8.5 - coilH / 2 + r * rowSpacing;

    const tubeGeo = new THREE.CylinderGeometry(tubeRadius, tubeRadius, coilW, 12);
    const tube = new THREE.Mesh(tubeGeo, copperMat);
    tube.position.set(5, y, 0);
    tube.rotation.z = Math.PI / 2;
    tube.castShadow = true;
    coilGroup.add(tube);

    if (r < rows - 1) {
      const nextY = 8.5 - coilH / 2 + (r + 1) * rowSpacing;
      const bendRadius = (nextY - y) / 2;
      const bendCenterY = (y + nextY) / 2;

      const bendGeo = new THREE.TorusGeometry(bendRadius, tubeRadius, 8, 12, Math.PI);
      const bend = new THREE.Mesh(bendGeo, copperMat);
      bend.position.set(5 + coilW / 2, bendCenterY, 0);
      bend.rotation.z = Math.PI / 2;
      bend.castShadow = true;
      coilGroup.add(bend);
    }
  }

  const finMat = new THREE.MeshStandardMaterial({ color: 0xc0c0c0, metalness: 0.7, roughness: 0.25, transparent: true, opacity: 0.35 });
  const finCount = Math.floor(coilW / 0.15);
  const finSpacing = coilW / finCount;

  for (let f = 0; f < finCount; f++) {
    const x = 5 - coilW / 2 + f * finSpacing + finSpacing / 2;
    const finGeo = new THREE.BoxGeometry(0.02, coilH * 0.95, coilD * 0.95);
    const fin = new THREE.Mesh(finGeo, finMat);
    fin.position.set(x, 8.5, 0);
    coilGroup.add(fin);
  }

  scene.add(coilGroup);
  components.evaporator = coilGroup;
}

function buildPumps() {
  createBox(2.5, 2, 2.5, 0x222233, [28, 1, 8], 'condensatePump_base');

  // Cooling fans - evenly distributed on the sintering machine side
  const fanRadius = 0.9;

  const fanStartX = fanCenterX - (fanCount - 1) * fanSpacing / 2;
  
  const fanGroup = new THREE.Group();

    const housingMat = makeMat(0x666666, 0.1);

    housing.position.set(fanX, 2, -6.4);

    const hub = new THREE.Mesh(hubGeo, hubMat);
    hub.position.set(fanX, 2, -6.4);
    hub.rotation.x = Math.PI / 2;
    scene.add(hub);
    
    // Fan blades

    for (let b = 0; b < bladeCount; b++) {
      const bladeGeo = new THREE.BoxGeometry(0.6, 0.06, fanRadius * 0.65);
      const bladeMat = makeMat(0x5588cc, 0.2);
      const blade = new THREE.Mesh(bladeGeo, bladeMat);
      const angle = (b / bladeCount) * Math.PI * 2;
      blade.position.set(
        fanX + Math.cos(angle) * fanRadius * 0.38,

        -6.4

      blade.rotation.z = angle;

    const fanCyl = createCylinder(fanRadius, fanRadius, 0.6, 0x5588cc, [fanX, 2, -6], 'coolingFan_tmp', 24);
    fanGroup.add(fanCyl);
  }
  scene.add(fanGroup);

function getComponentPosition(comp) {
  if (comp.type === 'Group') {
    // Compute center from children bounding box
    const box = new THREE.Box3().setFromObject(comp);
    const center = new THREE.Vector3();
    box.getCenter(center);
    return center;
  }
  return comp.position.clone();
}

function createFlowParticles() {
  const flowPaths = [
    { color: 0xff4444, points: [[-18, 4.5, 0], [-18, 8, 0], [-3, 8, 0], [-3, 12, 0], [2, 12, 0], [2, 14.5, 0], [5, 14.5, 0], [5, 15, 0]], count: 30, label: 'hotGas' },
    { color: 0xffaa00, points: [[5, 7, 0], [5, 10, 0], [10, 10, 0], [10, 14, 0], [14, 14, 0], [14, 11, 0]], count: 25, label: 'steam' },
    { color: 0x00ccff, points: [[12, 11, 0], [22, 11, 0], [22, 6, 0], [28, 5, 0]], count: 20, label: 'steamToTurbine' },
    { color: 0x44aaff, points: [[0, 2, 5], [8, 2, 5], [8, 2, 12], [22, 2, 12], [22, 4, 12]], count: 20, label: 'feedwater' },
    { color: 0x88ccff, points: [[32, 1.5, 8], [32, 1, 8], [22, 1, 8], [22, 1, 12], [22, 2, 12]], count: 15, label: 'condensate' },
    { color: 0x3366aa, points: [[42, 0.3, 8], [32, 0.3, 8], [32, 1.5, 8]], count: 15, label: 'seawater' },
  ];

  flowPaths.forEach(flow => {
    const curve = new THREE.CatmullRomCurve3(flow.points.map(p => new THREE.Vector3(...p)));
    for (let i = 0; i < flow.count; i++) {
      const geo = new THREE.SphereGeometry(0.18, 6, 6);
      const mat = new THREE.MeshBasicMaterial({ color: flow.color, transparent: true, opacity: 0.8 });
      const particle = new THREE.Mesh(geo, mat);
      particle.userData = { curve, t: i / flow.count, speed: 0.15 + Math.random() * 0.05, label: flow.label };
      scene.add(particle);
      flowParticles.push(particle);
    }
  });
}

function setupInteraction() {
  renderer.domElement.addEventListener('click', onCanvasClick);
  renderer.domElement.addEventListener('mousemove', onCanvasHover);
}

function onCanvasClick(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const meshes = Object.values(components);
  const intersects = raycaster.intersectObjects(meshes, true);
  if (intersects.length > 0) {
    let obj = intersects[0].object;
    while (obj && !obj.userData.id && obj.parent) {
      obj = obj.parent;
    }
    const id = obj.userData.id;
    if (id && componentData[id]) showInfo(id);
  }
}

function onCanvasHover(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const meshes = Object.values(components);
  const intersects = raycaster.intersectObjects(meshes, true);
  if (intersects.length > 0) {
    // Walk up to find the root group with userData.id
    let obj = intersects[0].object;
    while (obj && !obj.userData.id && obj.parent) {
      obj = obj.parent;
    }
    if (hoveredComponent !== obj) {
      // Reset previous hover
      if (hoveredComponent) {
        setEmissive(hoveredComponent, 0.1);
      }
      hoveredComponent = obj;
      setEmissive(hoveredComponent, 0.6);
      renderer.domElement.style.cursor = 'pointer';
    }
  } else {
    if (hoveredComponent) {
      setEmissive(hoveredComponent, 0.1);
    }
    hoveredComponent = null;
    renderer.domElement.style.cursor = 'default';
  }
}

function focusComponent(id) {
  const comp = components[id];
  if (!comp) return;
  selectedComponent = id;

  document.querySelectorAll('.component-btn').forEach(b => b.classList.remove('active'));
  const buttons = document.querySelectorAll('.component-btn');
  buttons.forEach(b => {
    if (b.textContent.includes(componentData[id]?.name)) b.classList.add('active');
  });

  const pos = getComponentPosition(comp);
  const targetPos = new THREE.Vector3(pos.x + 15, pos.y + 10, pos.z + 15);
  animateCamera(targetPos, pos);
  showInfo(id);
}

function animateCamera(newPos, target) {
  const startPos = camera.position.clone();
  const startTarget = controls.target.clone();
  const duration = 1000;
  const start = Date.now();
  function update() {
    const elapsed = Date.now() - start;
    const t = Math.min(elapsed / duration, 1);
    const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    camera.position.lerpVectors(startPos, newPos, ease);
    controls.target.lerpVectors(startTarget, target, ease);
    controls.update();
    if (t < 1) requestAnimationFrame(update);
  }
  update();
}

function showInfo(id) {
  const data = componentData[id];
  if (!data) return;
  const panel = document.getElementById('info-panel');
  const content = document.getElementById('info-content');
  let specsHTML = '';
  Object.entries(data.specs).forEach(([k, v]) => {
    specsHTML += `<div class="spec"><span class="spec-label">${k}</span><span class="spec-value">${v}</span></div>`;
  });
  content.innerHTML = `
    <h2>${data.name}</h2>
    <span class="tag">${data.category.toUpperCase()}</span>
    <p>${data.desc}</p>
    <div class="section-title" style="margin:15px 0 10px">Specifications</div>
    ${specsHTML}
  `;
  panel.classList.add('visible');
}

function setEmissive(obj, intensity) {
  if (!obj) return;
  if (obj.type === 'Group') {
    obj.children.forEach(child => {
      if (child.material && child.material.emissiveIntensity !== undefined) {
        child.material.emissiveIntensity = intensity;
      }
    });
  } else if (obj.material && obj.material.emissiveIntensity !== undefined) {
    obj.material.emissiveIntensity = intensity;
  }
}

function closeInfo() {
  document.getElementById('info-panel').classList.remove('visible');
  document.querySelectorAll('.component-btn').forEach(b => b.classList.remove('active'));
  selectedComponent = null;
}

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const btn = document.getElementById('toggle-sidebar');
  sidebar.classList.toggle('collapsed');
  btn.classList.toggle('shifted');
}

function toggleFlow() {
  flowEnabled = !flowEnabled;
  const toggle = document.getElementById('flow-toggle');
  if (toggle) toggle.textContent = `Flow: ${flowEnabled ? 'ON' : 'OFF'}`;
  flowParticles.forEach(p => { p.visible = flowEnabled; });
}



function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  if (flowEnabled) {
    flowParticles.forEach(p => {
      p.userData.t += p.userData.speed * delta;
      if (p.userData.t > 1) p.userData.t -= 1;
      const pos = p.userData.curve.getPoint(p.userData.t);
      p.position.copy(pos);
      p.material.opacity = 0.5 + Math.sin(p.userData.t * Math.PI) * 0.4;
    });
  }

  Object.keys(components).forEach(key => {
    if (key === selectedComponent && components[key]) {
      setEmissive(components[key], 0.3 + Math.sin(Date.now() * 0.003) * 0.2);
    }
  });

  controls.update();
  renderer.render(scene, camera);
}

init();
</script>
</body>
</html>
